name: Build and Push Docker Image

on:
  push:
    branches: [ main ]   # publish :latest on every main commit (Komodo auto-pulls)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (optional, defaults to latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: registry.mormor.cloud   # self-hosted Zot (WG-only → must run on self-hosted)
  IMAGE_NAME: ytclipper-go

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, homelab-vps]
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ci
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ github.event.inputs.tag || 'latest' }}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
